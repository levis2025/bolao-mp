<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão - M.P.</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍀</text></svg>">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;font-size:13px;background:#f0f4f0;color:#1a1a1a;min-height:100vh; transition: background 0.3s, color 0.3s;}
  h2{font-size:18px;font-weight:600;color:#1a4731;margin-bottom:4px}

  .topbar{background:#1a4731;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .topbar h1{font-size:16px;font-weight:600;letter-spacing:.5px}
  .saved-tag{font-size:11px;opacity:.8}

  .container{max-width:900px;margin:0 auto;padding:0 16px}

  .add-bar{background:#fff;border-bottom:1px solid #d4e6d4;padding:10px 16px}
  .add-bar-inner{max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center}
  .add-bar input[type=text]{padding:6px 10px;border:1px solid #b2cfb2;border-radius:8px;font-size:13px;background:#f9fdf9;width:100%}
  .add-bar input[type=text]:focus{outline:none;border-color:#2d6a4f;box-shadow:0 0 0 2px rgba(45,106,79,.15)}
  .add-bar-buttons{display:flex;gap:5px;flex-wrap:nowrap}
  .btn{padding:6px 12px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap}
  .btn:active{transform:scale(.97)}
  .btn-add{background:#2d6a4f;color:#fff}
  .btn-add:hover{background:#1a4731}
  .btn-export{background:#185FA5;color:#fff}
  .btn-export:hover{background:#0C447C}
  .btn-limpar{background:#c0392b;color:#fff}
  .btn-limpar:hover{background:#922b21}
  .btn-lista{background:#6d4c41;color:#fff}
  .btn-lista:hover{background:#4e342e}

  .main-wrap{max-width:900px;margin:12px auto;padding:0 16px}
  .main{display:grid;grid-template-columns:1fr 1fr;gap:0;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.1)}

  .panel{background:#fff;display:flex;flex-direction:column}
  .panel+.panel{border-left:1px solid #d4e6d4}

  .ph{background:#1a4731;color:#fff;padding:10px 12px;text-align:center;font-size:12px;font-weight:600;letter-spacing:.3px}

  .cfg{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px;background:#f9fdf9;border-bottom:1px solid #d4e6d4}
  .cfg-item{display:flex;flex-direction:column;gap:3px}
  .cfg-item label{font-size:9px;font-weight:600;color:#2d6a4f;text-transform:uppercase;letter-spacing:.2px}
  .cfg-item input{padding:5px 6px;border:1px solid #b2cfb2;border-radius:6px;font-size:12px;font-weight:600;background:#fff;color:#1a1a1a}
  .cfg-item input:focus{outline:none;border-color:#2d6a4f;box-shadow:0 0 0 2px rgba(45,106,79,.15)}

  .col-header{display:grid;background:#2d6a4f;color:#fff;font-size:9px;font-weight:700;padding:6px 6px;letter-spacing:0;text-transform:uppercase;gap:4px}
  .ativos .col-header{grid-template-columns:1fr 44px 68px}
  .base .col-header{grid-template-columns:1fr 44px 68px 20px}
  .col-header span{text-align:center}
  .col-header span:first-child{text-align:left}

  .list{overflow-y:auto;max-height:320px; outline: none;}
  .row{display:grid;padding:5px 6px;border-bottom:1px solid #edf5ed;align-items:center;cursor:pointer;transition:background .12s}
  .ativos .row{grid-template-columns:1fr 44px 68px}
  .base .row{grid-template-columns:1fr 44px 68px 20px}
  .row:hover{background:#e8f4e8}
  .row.even{background:#f5fbf5}
  .row.even:hover{background:#e8f4e8}
  .row span{font-size:10px;text-align:center;color:#1a1a1a}
  .row span:first-child{text-align:left;font-weight:600;color:#1a4731; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100px;}

  .base .row.selected {
    background: #c8e6c9 !important;
  }
  .base .delbtn {
    opacity: 0;
    transition: opacity 0.2s;
  }
  .base .row:hover .delbtn, 
  .base .row.selected .delbtn {
    opacity: 1;
  }

  .badge{background:#d4edda;color:#1a4731;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700;display:inline-block}

  .footer-row{display:grid;background:#1a4731;color:#fff;padding:6px 6px;font-size:10px;font-weight:700}
  .ativos .footer-row{grid-template-columns:1fr 44px 68px}
  .base .footer-row{grid-template-columns:1fr 44px 68px 20px}
  .footer-row span{text-align:center}
  .footer-row span:first-child{text-align:left}

  .delbtn{background:none;border:none;color:#c0392b;cursor:pointer;font-size:12px;line-height:1;padding:0;font-weight:700}
  .delbtn:hover{color:#922b21}

  .empty-msg{padding:16px;text-align:center;color:#888;font-size:11px;font-style:italic}

  .premio-wrap{max-width:900px;margin:0 auto;padding:0 16px}
  .premio-banner{display:none;background:#d4edda;border:1px solid #2d6a4f;border-radius:8px;padding:8px 10px;margin:8px 0;font-size:11px;color:#1a4731;font-weight:600;text-align:center}
  .premio-banner.show{display:block}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:12px;padding:16px;width:260px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
  .modal h3{font-size:14px;font-weight:700;color:#1a4731;margin-bottom:6px}
  .modal-hint{font-size:10px;color:#666;margin-bottom:10px}
  .modal input{width:100%;padding:7px 8px;border:1px solid #b2cfb2;border-radius:8px;font-size:14px;font-weight:700;margin-bottom:10px;color:#1a1a1a;background:#f9fdf9}
  .modal input:focus{outline:none;border-color:#2d6a4f;box-shadow:0 0 0 2px rgba(45,106,79,.15)}
  .modal-btns{display:flex;gap:6px;justify-content:flex-end}
  .modal-btns button{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none}
  .btn-cancel{background:#f0f0f0;color:#333}
  .btn-cancel:hover{background:#e0e0e0}
  .btn-ok{background:#2d6a4f;color:#fff}
  .btn-ok:hover{background:#1a4731}

  .export-section{display:none;padding:10px 16px;background:#fff;border-top:1px solid #d4e6d4}
  .export-section .export-inner{max-width:900px;margin:0 auto;padding:0 16px}
  .export-section.show{display:block}
  .export-section p{font-size:10px;color:#555;margin-bottom:4px;font-weight:600}
  .export-section textarea{width:100%;min-height:120px;font-family:'Courier New',monospace;font-size:10px;padding:8px;border:1px solid #b2cfb2;border-radius:8px;resize:vertical;background:#f9fdf9;color:#1a1a1a}
  .export-btns{display:flex;gap:6px;margin-top:6px}

  /* Modo Escuro */
  body.dark-mode {
    background-color: #121212;
    color: #e0e0e0;
  }
  body.dark-mode .topbar { background-color: #0b2214; }
  body.dark-mode .add-bar,
  body.dark-mode .main,
  body.dark-mode .panel,
  body.dark-mode .export-section {
    background-color: #1e1e1e;
    border-color: #333;
  }
  body.dark-mode .panel+.panel {
    border-left: 1px solid #333;
  }
  body.dark-mode .add-bar input[type=text],
  body.dark-mode .cfg-item input,
  body.dark-mode .export-section textarea,
  body.dark-mode .modal input {
    background-color: #2d2d2d;
    border-color: #555;
    color: #e0e0e0;
  }
  body.dark-mode .cfg {
    background-color: #1a1a1a;
    border-color: #333;
  }
  body.dark-mode .col-header {
    background-color: #1b4a34;
    color: #e0e0e0;
  }
  body.dark-mode .row {
    border-bottom: 1px solid #333;
    background-color: #1e1e1e;
  }
  body.dark-mode .row span {
    color: #e0e0e0;
  }
  body.dark-mode .row span:first-child {
    color: #69c288;
  }
  body.dark-mode .row:hover {
    background-color: #243026;
  }
  body.dark-mode .row.even {
    background-color: #181818;
  }
  body.dark-mode .row.even:hover {
    background-color: #243026;
  }
  body.dark-mode .footer-row {
    background-color: #112d1b;
    color: #e0e0e0;
  }
  body.dark-mode .premio-banner {
    background-color: #0c2b18;
    border-color: #1b4a34;
    color: #69c288;
  }
  body.dark-mode .modal {
    background-color: #242424;
    border: 1px solid #444;
  }
  body.dark-mode .modal h3 {
    color: #69c288;
  }
  body.dark-mode .modal-hint {
    color: #aaa;
  }
  body.dark-mode .btn-cancel {
    background-color: #333;
    color: #ddd;
  }
  body.dark-mode .btn-cancel:hover {
    background-color: #444;
  }
  body.dark-mode .export-section p {
    color: #aaa;
  }

  @media(max-width:480px) {
    .topbar { padding: 8px 10px; }
    .topbar h1 { font-size: 13px; }
    
    .add-bar { padding: 8px 10px; }
    .add-bar-inner { grid-template-columns: 1fr; gap: 6px; }
    .add-bar-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .btn { padding: 7px 6px; font-size: 11px; width: 100%; text-align: center; }
    .main-wrap { padding: 0 8px; }
    .premio-wrap { padding: 0 8px; }
    
    .col-header, .footer-row {
      font-size: 8px;
    }
    
    .row span {
      font-size: 9px;
    }
    .row span:first-child {
      font-size: 11px;
      font-weight: bold;
    }
    
    .col-header { padding: 4px 2px; }
    .row { padding: 4px 2px; }
    .footer-row { padding: 5px 2px; }
    
    .ativos .col-header, .ativos .row, .ativos .footer-row {
      grid-template-columns: 1fr 40px 58px;
    }
    .base .col-header, .base .row, .footer-row.base, .base .footer-row {
      grid-template-columns: 1fr 40px 58px 16px;
    }
    
    .row span:first-child {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 115px;
    }
    
    .cfg { grid-template-columns: 1fr; gap: 4px; padding: 6px 8px; }
    .cfg-item label { font-size: 8px; }
    .cfg-item input { font-size: 11px; padding: 3px 4px; }
  }

  @media(max-width:600px){
    .main{grid-template-columns:1fr}
    .panel+.panel{border-left:none;border-top:1px solid #d4e6d4}
    .main-wrap{margin:8px auto}
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>🍀 Bolão - M.P.</h1>
  <span class="saved-tag" id="saved-tag"></span>
</div>

<div class="add-bar">
  <div class="add-bar-inner">
    <input type="text" id="novo-nome" placeholder="Nome do novo participante..." maxlength="30">
    <div class="add-bar-buttons">
      <button class="btn btn-add" onclick="adicionarParticipante()">+ Adicionar</button>
      <button class="btn btn-lista" onclick="exportarLista()">&#128101; Lista</button>
      <button class="btn btn-export" onclick="exportarResultado()">&#127942; Resultado</button>
      <button class="btn btn-limpar" onclick="limparCotas()">&#10006; Limpar</button>
      <button class="btn" style="background:#34495e; color:#fff;" onclick="toggleDarkMode()">&#127769; Modo Escuro</button>
    </div>
  </div>
</div>

<div class="main-wrap">
<div class="main">
  <div class="panel ativos">
    <div class="ph">BASE DO BOLÃO</div>
    <div class="cfg">
      <div class="cfg-item">
        <label>Valor da Cota R$</label>
        <input type="text" id="valor-cota" value="6,00" inputmode="decimal" oninput="salvarERecalcular()">
      </div>
      <div class="cfg-item">
        <label>Valor do Prêmio R$</label>
        <input type="text" id="valor-premio" value="0,00" inputmode="decimal" oninput="salvarERecalcular()">
      </div>
    </div>
    <div class="col-header"><span>Participante</span><span>Cotas</span><span>A Receber</span></div>
    <div class="list" id="lista-ativos"></div>
    <div class="footer-row ativos">
      <span>Total</span><span id="fta-c">0</span><span id="fta-v">0,00</span>
    </div>
  </div>

  <div class="panel base">
    <div class="ph">Base Geral de Participantes</div>
    <div style="padding:6px 8px;background:#f9fdf9;border-bottom:1px solid #d4e6d4;font-size:9.5px;color:#555;text-align:center">
    </div>
    <div class="col-header"><span>Nome</span><span>Cotas</span><span>Valor Pago</span><span></span></div>
    <div class="list" id="lista-base" tabindex="0"></div>
    <div class="footer-row base">
      <span id="ftb-t">0</span><span id="ftb-c">0</span><span id="ftb-v">0,00</span><span></span>
    </div>
  </div>
</div>

<div class="premio-wrap">
<div class="premio-banner" id="premio-banner"></div>
</div>

<div class="export-section" id="export-section">
  <div class="export-inner">
  <p>Resultado para compartilhar (copie e cole no WhatsApp):</p>
  <textarea id="export-text" readonly></textarea>
  <div class="export-btns">
    <button class="btn btn-add" onclick="copiarExport('export-text', this)">Copiar texto</button>
    <button class="btn" style="background:#e0e0e0;color:#333" onclick="document.getElementById('export-section').classList.remove('show')">Fechar</button>
  </div>
  </div>
</div>

<div class="export-section" id="lista-section">
  <div class="export-inner">
  <p>Lista de participantes com cotas e valor pago (para divulgar no grupo):</p>
  <textarea id="lista-text" readonly></textarea>
  <div class="export-btns">
    <button class="btn btn-add" onclick="copiarExport('lista-text', this)">Copiar texto</button>
    <button class="btn" style="background:#e0e0e0;color:#333" onclick="document.getElementById('lista-section').classList.remove('show')">Fechar</button>
  </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="m-title"></h3>
    <p class="modal-hint" id="m-hint"></p>
    <input type="number" id="m-input" min="0" step="0.01" value="0.00" placeholder="Valor pago R$">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-ok" onclick="salvarModal()">Salvar</button>
    </div>
  </div>
</div>

<script>
const KEY = 'bolao_v2';
let modalPessoa = null;
let selectedParticipante = null;

let estado = {
  participantes: [],
  cotas: {},
  valorCota: 6,
  premio: 0
};

async function carregarEstadoInicial() {
  try {
    if (window.db) {
      const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const docRef = doc(window.db, "boloes", "bolao_v2");
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        estado = docSnap.data();
        const tag = document.getElementById('saved-tag');
        tag.textContent = 'Dados carregados da nuvem';
      } else {
        throw new Error("Documento não encontrado");
      }
    } else {
      throw new Error("DB não inicializado");
    }
  } catch(e) {
    console.log("Usando localStorage", e);
    const s = localStorage.getItem(KEY);
    if (s) {
      estado = JSON.parse(s);
      const tag = document.getElementById('saved-tag');
      tag.textContent = 'Dados restaurados do dispositivo';
    } else {
      estado = {
        participantes: ["Breno","Clodoaldo","Denis","Dr. Claudio Rogério","Dr. Joel","Jorge Luiz","Larícia","Levi","Liis Gustavo","Marcos RH","Osmar","Paulo Ernica","Pedro","Reginaldo Faria","Renato Endo","Renato Ribeiro","Vanessa"],
        cotas: {},
        valorCota: 6,
        premio: 0
      };
    }
  }
  
  document.getElementById('valor-cota').value = fmtBR(estado.valorCota || 6);
  document.getElementById('valor-premio').value = fmtBR(estado.premio || 0);
  recalcular();
}

window.carregarEstadoInicial = carregarEstadoInicial;

function getNumberValue(id) {
  const val = document.getElementById(id).value;
  return parseFloat(val.toString().replace(/\./g, '').replace(',', '.')) || 0;
}

async function salvar() {
  estado.valorCota = getNumberValue('valor-cota') || 6;
  estado.premio = getNumberValue('valor-premio') || 0;
  
  try {
    localStorage.setItem(KEY, JSON.stringify(estado));
    
    if (window.db) {
      const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      await setDoc(doc(window.db, "boloes", "bolao_v2"), estado);
      
      const t = document.getElementById('saved-tag');
      const agora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
      t.textContent = 'Salvo na nuvem às ' + agora;
    }
  } catch(e) {
    console.error("Erro ao salvar no Firestore", e);
  }
}

function salvarERecalcular() {
  salvar();
  recalcular();
}

function fmtBR(n) {
  return n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function recalcular() {
  const vCota = getNumberValue('valor-cota');
  const premio = getNumberValue('valor-premio');
  
  const todos = [...estado.participantes].sort((a,b) => a.localeCompare(b,'pt-BR'));
  const ativos = todos.filter(n => (estado.cotas[n]||0) > 0);
  const totalCotasA = ativos.reduce((s,n) => s + (estado.cotas[n]||0), 0);
  const vPorCota = totalCotasA > 0 ? premio / totalCotasA : 0;

  const la = document.getElementById('lista-ativos');
  la.innerHTML = '';
  if (ativos.length === 0) {
    la.innerHTML = '<div class="empty-msg">Nenhum participante com cotas ainda.</div>';
  } else {
    ativos.forEach((n, i) => {
      const c = estado.cotas[n] || 0;
      const r = document.createElement('div');
      r.className = 'row' + (i%2===0?' even':'');
      r.innerHTML = `<span>${n}</span><span><span class="badge">${c}</span></span><span>${fmtBR(c*vPorCota)}</span>`;
      r.onclick = () => abrirModal(n, vCota);
      la.appendChild(r);
    });
  }
  document.getElementById('fta-c').textContent = totalCotasA;
  document.getElementById('fta-v').textContent = fmtBR(premio);

  const lb = document.getElementById('lista-base');
  lb.innerHTML = '';
  todos.forEach((n, i) => {
    const c = estado.cotas[n] || 0;
    const r = document.createElement('div');
    r.className = 'row' + (i%2===0?' even':'');
    const nomeSafe = n.replace(/'/g,"\\'");
    r.innerHTML = `<span>${n}</span><span>${c>0?`<span class="badge">${c}</span>`:'<span style="color:#999">-</span>'}</span><span>${c>0?fmtBR(c*vCota):'0,00'}</span><span><button class="delbtn" onclick="removerParticipante('${nomeSafe}',event)" title="Remover">x</button></span>`;
    
    r.onclick = (e) => { 
      if(e.target.classList.contains('delbtn')) return; 
      abrirModal(n, vCota); 
    };
    lb.appendChild(r);
  });

  const totalCotasB = todos.reduce((s,n) => s + (estado.cotas[n]||0), 0);
  document.getElementById('ftb-t').textContent = todos.length;
  document.getElementById('ftb-c').textContent = totalCotasB;
  document.getElementById('ftb-v').textContent = fmtBR(totalCotasB * vCota);

  const banner = document.getElementById('premio-banner');
  if (premio > 0 && totalCotasA > 0) {
    banner.textContent = `Premio de R$ ${fmtBR(premio)} dividido em ${totalCotasA} cotas = R$ ${fmtBR(vPorCota)} por cota`;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }

  if (selectedParticipante) {
    highlightRow();
  }
}

function highlightRow() {
  const lb = document.getElementById('lista-base');
  const rows = lb.querySelectorAll('.row');
  rows.forEach((r) => {
    const nameSpan = r.querySelector('span:first-child');
    if (nameSpan && nameSpan.textContent === selectedParticipante) {
      r.classList.add('selected');
      r.scrollIntoView({ block: 'nearest' });
    } else {
      r.classList.remove('selected');
    }
  });
}

function adicionarParticipante() {
  const inp = document.getElementById('novo-nome');
  const nome = inp.value.trim();
  if (!nome) return;
  if (estado.participantes.map(n=>n.toLowerCase()).includes(nome.toLowerCase())) {
    inp.style.borderColor = '#c0392b';
    inp.title = 'Participante já existe';
    setTimeout(() => { inp.style.borderColor = ''; inp.title = ''; }, 2000);
    return;
  }
  estado.participantes.push(nome);
  inp.value = '';
  salvarERecalcular();
}

function removerParticipante(nome, e) {
  e.stopPropagation();
  if (!confirm(`Remover "${nome}" da base?`)) return;
  estado.participantes = estado.participantes.filter(n => n !== nome);
  delete estado.cotas[nome];
  
  if (selectedParticipante === nome) {
    selectedParticipante = null;
  }
  
  salvarERecalcular();
}

function abrirModal(nome, vCota) {
  modalPessoa = nome;
  selectedParticipante = nome;
  highlightRow();
  
  const cotasAtuais = estado.cotas[nome] || 0;
  const valorAtual = cotasAtuais * vCota;
  
  document.getElementById('m-title').textContent = nome;
  document.getElementById('m-hint').textContent = `Cota unitária: R$ ${fmtBR(vCota)} | Atual: ${cotasAtuais} cota(s) (Valor Pago: R$ ${fmtBR(valorAtual)})`;
  document.getElementById('m-input').value = valorAtual.toFixed(2);
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('m-input').select(), 60);
}

function fecharModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalPessoa = null;
}

function salvarModal() {
  if (!modalPessoa) return;
  const v = parseFloat(document.getElementById('m-input').value) || 0;
  const vCota = getNumberValue('valor-cota');
  
  const cotas = vCota > 0 ? Math.round(v / vCota) : 0;
  
  estado.cotas[modalPessoa] = Math.max(0, cotas);
  fecharModal();
  salvarERecalcular();
  
  const lb = document.getElementById('lista-base');
  if (lb) lb.focus();
}

function limparCotas() {
  if (!confirm('Zerar todas as cotas de todos os participantes? Os nomes serão mantidos.')) return;
  estado.cotas = {};
  salvarERecalcular();
}

function exportarLista() {
  const vCota = getNumberValue('valor-cota');
  const todos = [...estado.participantes].sort((a,b) => a.localeCompare(b,'pt-BR'));
  const comCotas = todos.filter(n => (estado.cotas[n]||0) > 0);
  const totalCotas = comCotas.reduce((s,n) => s + (estado.cotas[n]||0), 0);
  const totalPago = totalCotas * vCota;
  const agora = new Date().toLocaleString('pt-BR');

  let txt = `BOLAO - LISTA DE PARTICIPANTES\n`;
  txt += `Data: ${agora}\n`;
  txt += `Valor da cota: R$ ${fmtBR(vCota)}\n`;
  txt += `${'='.repeat(40)}\n\n`;
  txt += `CONFIRMADOS (${comCotas.length} participantes):\n`;
  txt += `${'-'.repeat(40)}\n`;
  comCotas.forEach((n, i) => {
    const c = estado.cotas[n] || 0;
    const pago = fmtBR(c * vCota);
    txt += `${String(i+1).padStart(2)}. ${n.padEnd(22).substring(0,22)}  ${c}x  R$ ${pago}\n`;
  });
  txt += `${'-'.repeat(40)}\n`;
  txt += `TOTAL: ${totalCotas} cotas  |  R$ ${fmtBR(totalPago)} arrecadado\n`;

  document.getElementById('lista-text').value = txt;
  const sec = document.getElementById('lista-section');
  sec.classList.add('show');
  document.getElementById('export-section').classList.remove('show');
  sec.scrollIntoView({behavior:'smooth'});
}

function exportarResultado() {
  const vCota = getNumberValue('valor-cota');
  const premio = getNumberValue('valor-premio');
  const todos = [...estado.participantes].sort((a,b) => a.localeCompare(b,'pt-BR'));
  const ativos = todos.filter(n => (estado.cotas[n]||0) > 0);
  const totalCotas = ativos.reduce((s,n) => s + (estado.cotas[n]||0), 0);
  const vPorCota = totalCotas > 0 ? premio / totalCotas : 0;
  const agora = new Date().toLocaleString('pt-BR');

  let txt = `BOLAO - RESULTADO\n`;
  txt += `Data: ${agora}\n`;
  txt += `${'='.repeat(42)}\n`;
  txt += `Valor da cota:   R$ ${fmtBR(vCota)}\n`;
  txt += `Premio total:    R$ ${fmtBR(premio)}\n`;
  txt += `Total de cotas:  ${totalCotas}\n`;
  if (totalCotas > 0) txt += `Valor por cota:  R$ ${fmtBR(vPorCota)}\n`;
  txt += `${'='.repeat(42)}\n`;
  txt += `PARTICIPANTE            COTAS   A RECEBER\n`;
  txt += `${'-'.repeat(42)}\n`;
  ativos.forEach(n => {
    const c = estado.cotas[n] || 0;
    const rec = fmtBR(c * vPorCota);
    const nPad = n.substring(0,22).padEnd(22);
    txt += `${nPad}  ${String(c).padStart(5)}   R$ ${rec}\n`;
  });
  txt += `${'-'.repeat(42)}\n`;
  txt += `TOTAL                   ${String(totalCotas).padStart(5)}   R$ ${fmtBR(premio)}\n`;
  if (premio === 0) txt += `\n(Premio ainda nao definido - informe o valor do premio)\n`;

  document.getElementById('export-text').value = txt;
  const sec = document.getElementById('export-section');
  sec.classList.add('show');
  document.getElementById('lista-section').classList.remove('show');
  sec.scrollIntoView({behavior:'smooth'});
}

function copiarExport(id, btn) {
  const ta = document.getElementById(id);
  ta.select();
  ta.setSelectionRange(0, 99999);
  try {
    document.execCommand('copy');
    const orig = btn.textContent;
    btn.textContent = 'Copiado!';
    setTimeout(() => btn.textContent = orig, 2000);
  } catch(e) {
    alert('Copie manualmente o texto acima.');
  }
}

function toggleDarkMode() {
  const body = document.body;
  body.classList.toggle('dark-mode');
  if (body.classList.contains('dark-mode')) {
    localStorage.setItem('bolao_dark', 'true');
  } else {
    localStorage.removeItem('bolao_dark');
  }
}

const lb = document.getElementById('lista-base');
lb.addEventListener('keydown', (e) => {
  if (document.getElementById('modal-overlay').classList.contains('open')) return;
  if (document.activeElement.tagName === 'INPUT') return;

  const todos = [...estado.participantes].sort((a,b) => a.localeCompare(b,'pt-BR'));
  if (todos.length === 0) return;

  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    let currentIdx = todos.indexOf(selectedParticipante);
    
    if (currentIdx === -1) {
      currentIdx = 0;
    } else {
      if (e.key === 'ArrowDown') {
        currentIdx = Math.min(currentIdx + 1, todos.length - 1);
      } else {
        currentIdx = Math.max(currentIdx - 1, 0);
      }
    }
    
    selectedParticipante = todos[currentIdx];
    highlightRow();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (selectedParticipante) {
      const vCota = getNumberValue('valor-cota');
      abrirModal(selectedParticipante, vCota);
    }
  }
});

document.getElementById('m-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.stopPropagation();
    salvarModal();
  }
});

document.getElementById('novo-nome').addEventListener('keydown', e => { if(e.key==='Enter') adicionarParticipante(); });
document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target===document.getElementById('modal-overlay')) fecharModal(); });

// Inicialização automática do estado
carregarEstadoInicial();

if (localStorage.getItem('bolao_dark') === 'true') {
  document.body.classList.add('dark-mode');
}
</script>
